<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Host4Me — Secure Connection</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="lock-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Secure Connection</h1>
      <p class="platform-name" id="platformName">Airbnb</p>
    </div>

    <form id="credentialForm" autocomplete="off">
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="off"
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Your password"
          required
          autocomplete="new-password"
        >
      </div>

      <div class="security-note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span>Encrypted with AES-256. Only used to maintain your login session automatically. Never stored in plain text.</span>
      </div>

      <button type="submit" id="submitBtn" class="submit-btn">
        <span id="btnText">Connect</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>
    </form>

    <div id="successView" class="success hidden">
      <div class="checkmark">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2>Connected!</h2>
      <p>You can close this window and return to the chat.</p>
    </div>

    <div id="errorView" class="error hidden">
      <p id="errorMessage"></p>
      <button onclick="resetForm()" class="retry-btn">Try Again</button>
    </div>
  </div>

  <script src="credential-form.js"></script>
</body>
</html>
