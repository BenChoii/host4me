version: '3.8'

# Worker VPS Docker Compose — runs browser agent + ADK runner
# Data and auth handled by Convex (cloud). This just runs the heavy stuff.

services:
  # ==========================================================================
  # ADK Agent Runner — Alfred + sub-agents via OpenRouter
  # ==========================================================================
  adk-runner:
    build:
      context: ../backend/agents
      dockerfile: Dockerfile
    container_name: host4me-adk-runner
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AGENT_MODEL_PRIMARY: ${AGENT_MODEL_PRIMARY:-google/gemma-4-26b-a4b-it}
      AGENT_MODEL_FAST: ${AGENT_MODEL_FAST:-google/gemma-4-26b-a4b-it}
      WORKER_API_SECRET: ${WORKER_API_SECRET}
      HOST4ME_DATA_DIR: /data
    ports:
      - "3200:3200"
    volumes:
      - worker_data:/data

  # ==========================================================================
  # Browser Agent — Playwright + Gemma 4 vision via OpenRouter
  # ==========================================================================
  browser-agent:
    build:
      context: ../backend/browser
      dockerfile: Dockerfile
    container_name: host4me-browser-agent
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      VISION_MODEL: ${VISION_MODEL:-google/gemma-4-26b-a4b-it}
      HOST4ME_DATA_DIR: /data
    ports:
      - "8100:8100"
    volumes:
      - worker_data:/data
    # Playwright needs more shared memory
    shm_size: '2gb'

volumes:
  worker_data:
